<div id="hearts"></div>
<canvas id="fireworks"></canvas>

<style>

body {
  overflow: hidden;
}

/* Hearts */

#hearts {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 999;
}

.heart {
  position: absolute;
  font-size: 22px;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  from {
    transform: translateY(100vh);
    opacity: 1;
  }
  to {
    transform: translateY(-10vh);
    opacity: 0;
  }
}

/* Click hearts */

.click-heart {
  position: fixed;
  font-size: 28px;
  animation: pop 1s forwards;
}

@keyframes pop {
  from {opacity:1; transform:scale(1);}
  to {opacity:0; transform:scale(2);}
}

/* Fireworks */

canvas {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
}

</style>

<script>

/* Floating hearts */

function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💖";

  heart.style.left =
    Math.random() * 100 + "vw";

  heart.style.animationDuration =
    (3 + Math.random()*3) + "s";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}

setInterval(createHeart, 300);

/* Click hearts */

document.addEventListener(
  "click",
  function(e) {

    const h =
      document.createElement("div");

    h.className = "click-heart";
    h.innerHTML = "❤️";

    h.style.left = e.clientX + "px";
    h.style.top = e.clientY + "px";

    document.body.appendChild(h);

    setTimeout(()=>{
      h.remove();
    },1000);

});

/* Simple fireworks */

const canvas =
  document.getElementById("fireworks");

const ctx =
  canvas.getContext("2d");

canvas.width =
  window.innerWidth;

canvas.height =
  window.innerHeight;

function firework() {

  let x =
    Math.random()*canvas.width;

  let y =
    Math.random()*canvas.height/2;

  for(let i=0;i<20;i++){

    ctx.beginPath();

    ctx.arc(
      x+Math.random()*50-25,
      y+Math.random()*50-25,
      2,
      0,
      Math.PI*2
    );

    ctx.fillStyle="white";
    ctx.fill();
  }

}

setInterval(firework,1000);

</script>
